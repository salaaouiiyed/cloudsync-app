server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Servir le SPA React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache statique agressif pour les assets hashés (JS/CSS/images)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # FIX 10: Proxy API vers le backend avec TOUS les headers nécessaires
    # Le browser envoie les requêtes à localhost:3000/api/...
    # nginx les forward au container backend:5000/api/...
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FIX: Passer le header Authorization (JWT Bearer token)
        proxy_set_header   Authorization $http_authorization;
        proxy_pass_header  Authorization;

        # Timeouts adaptés pour les appels longs
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        # Désactiver le buffering pour les réponses streaming
        proxy_buffering off;
    }

    # Health check
    location /healthz {
        proxy_pass         http://backend:5000/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Métriques (optionnel — bloquer en prod si exposé publiquement)
    location /metrics {
        proxy_pass         http://backend:5000/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
