server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Servir le SPA React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache statique agressif pour les assets hashés (JS/CSS/images)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy API vers le backend
    location /api/ {
        proxy_pass http://backend-svc:5000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_pass_header Authorization;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_buffering off;
    }

    # FIX: Health check STATIQUE — ne dépend PAS du backend
    # Utilisé par les probes K8s du pod frontend
    # Répond toujours 200 si nginx est en vie, indépendamment du backend
    location /healthz-static {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Health check backend (accès direct, pas utilisé par les probes K8s frontend)
    location /healthz {
        proxy_pass         http://backend-svc:5000/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Métriques (bloquer en prod si exposé publiquement)
    location /metrics {
        proxy_pass         http://backend-svc:5000/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
