apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudsync-ingress
  namespace: cloudsync
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway

    # FIX Bug 2: Timeout étendu pour éviter les 502 au démarrage de Keycloak (~60s)
    appgw.ingress.kubernetes.io/request-timeout: "60"

    # FIX Bug 1: Health probe correcte pour le backend pool principal (frontend)
    # L'App Gateway utilise ce path pour vérifier que les pods sont vivants
    appgw.ingress.kubernetes.io/health-probe-path: "/healthz-static"
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399"

    # Désactiver la redirection SSL (pas de certificat pour l'instant)
    appgw.ingress.kubernetes.io/ssl-redirect: "false"

spec:
  rules:
    - http:
        paths:
          # FIX Bug 3: /auth routé vers keycloak-svc
          # Keycloak DOIT démarrer avec --http-relative-path=/auth
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak-svc
                port:
                  number: 8080

          # FIX Bug 5: backend-svc écoute sur 5000
          # AGIC crée automatiquement le backend_http_settings sur port 5000
          # (pas besoin de le forcer à 80 dans le TF App Gateway)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 5000

          # Frontend sur port 80 (nginx)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
