apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloudsync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: <ACR_NAME>.azurecr.io/cloudsync-frontend:latest
          ports:
            - containerPort: 80
          # Les variables du ConfigMap sont injectées dans le container
          # env.sh les lit au démarrage et génère window._env_ dans env-config.js
          envFrom:
            - configMapRef:
                name: frontend-env-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
