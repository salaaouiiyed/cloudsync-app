apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloudsync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: acrcloudsync2026.azurecr.io/cloudsync-frontend:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: frontend-env-config
          # FIX: La probe teste une route statique nginx (/healthz-static)
          # et NON le proxy vers backend:5000/healthz
          # → Si backend est down, le frontend reste quand même Ready
          # Note: nginx.conf doit avoir un bloc "location /healthz-static"
          # qui répond 200 directement (voir nginx.conf corrigé)
          readinessProbe:
            httpGet:
              path: /healthz-static
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz-static
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
