apiVersion: v1
data:
  realm.json: |-
    {
      "id": "cloudsync-realm",
      "realm": "cloudsync-realm",
      "displayName": "CloudSync Pro",
      "enabled": true,
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "sslRequired": "none",
      "bruteForceProtected": true,
      "failureFactor": 5,
      "waitIncrementSeconds": 60,
      "maxFailureWaitSeconds": 900,
      "accessTokenLifespan": 300,
      "ssoSessionMaxLifespan": 36000,
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Tenant administrator \u2014 can manage projects, members, and workspace settings"
          },
          {
            "name": "user",
            "description": "Standard user \u2014 read-only access to tenant resources"
          },
          {
            "name": "super_admin",
            "description": "Platform super admin \u2014 cross-tenant management via Admin Console"
          }
        ]
      },
      "clients": [
        {
          "clientId": "cloudsync-app",
          "name": "CloudSync App",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            "http://localhost:3000/*",
            "http://localhost:3000",
            "http://52.143.159.54/*",
            "http://52.143.159.54"
          ],
          "webOrigins": [
            "http://localhost:3000",
            "http://52.143.159.54",
            "+"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": "http://localhost:3000/*"
          },
          "protocolMappers": [
            {
              "name": "tenant_id-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "tenant_id",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "tenant_id",
                "jsonType.label": "String",
                "multivalued": "false",
                "aggregate.attrs": "false"
              }
            }
          ],
          "rootUrl": "http://52.143.159.54"
        }
      ],
      "users": [
        {
          "username": "super-admin",
          "enabled": true,
          "email": "superadmin@cloudsync.pro",
          "firstName": "Super",
          "lastName": "Admin",
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "Change-Me-In-Prod-1!",
              "temporary": true
            }
          ],
          "realmRoles": [
            "super_admin",
            "admin"
          ],
          "attributes": {
            "tenant_id": [
              "platform"
            ]
          }
        },
        {
          "username": "admin-user",
          "enabled": true,
          "email": "admin@cloudsync.pro",
          "firstName": "Admin",
          "lastName": "User",
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "Change-Me-In-Prod-2!",
              "temporary": true
            }
          ],
          "realmRoles": [
            "admin"
          ],
          "attributes": {
            "tenant_id": [
              "tenant-alpha"
            ]
          }
        },
        {
          "username": "standard-user",
          "enabled": true,
          "email": "user@cloudsync.pro",
          "firstName": "Standard",
          "lastName": "User",
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "Change-Me-In-Prod-3!",
              "temporary": true
            }
          ],
          "realmRoles": [
            "user"
          ],
          "attributes": {
            "tenant_id": [
              "tenant-alpha"
            ]
          }
        }
      ]
    }
kind: ConfigMap
