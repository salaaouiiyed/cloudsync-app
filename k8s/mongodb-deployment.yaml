# ==============================================================================
# MongoDB — Base de données pour CloudSync
# FIX: Ce fichier manquait complètement. Le backend cherchait cloudsync-db-svc:27017
# mais aucun pod/service n'existait → infinite retry loop → backend crashloop
# ==============================================================================

# PersistentVolumeClaim — stockage persistant pour les données MongoDB
# Azure AKS provisionne automatiquement un Azure Disk via la StorageClass default
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: cloudsync
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # StorageClass par défaut dans AKS = managed-csi (Azure Disk Premium SSD)
  # Pour économiser le budget étudiant, on force managed (HDD standard)
  storageClassName: managed

---
# Deployment MongoDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: cloudsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          # FIX: Readiness probe — le backend attend que Mongo soit VRAIMENT prêt
          # avant d'essayer de se connecter (évite la boucle de retry)
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          env:
            # Pas d'auth pour simplifier (projet étudiant en cluster privé)
            # En prod: utiliser MONGO_INITDB_ROOT_USERNAME/PASSWORD + Secret K8s
            - name: MONGO_INITDB_DATABASE
              value: "cloudsync"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
# Service MongoDB — nom cloudsync-db-svc pour correspondre au backend
# Le backend utilise: mongodb://cloudsync-db-svc:27017/cloudsync
apiVersion: v1
kind: Service
metadata:
  name: cloudsync-db-svc
  namespace: cloudsync
spec:
  selector:
    app: mongodb
  # ClusterIP = interne seulement, jamais exposé publiquement
  # FIX Load Balancer: PAS de type: LoadBalancer ici
  # → évite la consommation d'IP publique (quota étudiant = 3 max)
  # → évite que K8s crée un LB Azure externe pour MongoDB (faille sécu + coût)
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
